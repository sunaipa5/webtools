<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>Sleep Calculator - Simple Webtools</title>
        <link rel="stylesheet" href="../style.css" />
        <style>
            .main-picker {
                margin-bottom: 25px;
                text-align: center;
                background: var(--card-bg);
                padding: 20px;
                border-radius: 16px;
                border: 1px solid rgba(255, 255, 255, 0.05);
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
                overflow: hidden;
            }

            .main-picker label {
                display: block;
                margin-bottom: 12px;
                font-weight: 700;
                color: var(--accent);
                font-size: 0.9rem;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            input[type="time"] {
                -webkit-appearance: none;
                appearance: none;
                width: 100%;
                max-width: 240px;
                background: var(--entry-bg);
                border: 2px solid rgba(255, 255, 255, 0.1);
                border-radius: 12px;
                color: #fff;
                padding: 10px 5px;
                font-size: 1.6rem;
                font-family: inherit;
                text-align: center;
                outline: none;
                display: inline-block;
                box-sizing: border-box;
            }

            input[type="time"]::-webkit-calendar-picker-indicator {
                background: transparent;
                bottom: 0;
                color: transparent;
                cursor: pointer;
                height: auto;
                left: 0;
                position: absolute;
                right: 0;
                top: 0;
                width: auto;
            }

            .grid-dual {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 15px;
            }

            .card h2 {
                font-size: 0.75rem;
                margin-bottom: 15px;
                color: var(--text-muted);
                text-transform: uppercase;
                text-align: center;
            }

            .results-list {
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            .time-slot {
                background: var(--entry-bg);
                padding: 12px;
                border-radius: 10px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                border: 1px solid rgba(255, 255, 255, 0.03);
            }

            .time-slot.best {
                border: 1px solid var(--accent);
                background: rgba(53, 132, 228, 0.08);
            }

            .time-val {
                font-size: 1.1rem;
                font-weight: 800;
                color: #fff;
            }

            .time-meta {
                font-size: 0.65rem;
                color: var(--text-muted);
                text-align: right;
            }

            @media (max-width: 768px) {
                .grid-dual {
                    grid-template-columns: 1fr;
                }
                .main-picker {
                    padding: 15px;
                }
                input[type="time"] {
                    max-width: 100%;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <a href="/" class="back-link">← Back to Tools</a>
            <header>
                <h1>Sleep Calculator</h1>
                <p class="subtitle">Optimize your sleep cycles.</p>
            </header>

            <div class="main-picker">
                <label for="baseTime">Select Time</label>
                <div style="position: relative">
                    <input type="time" id="baseTime" oninput="calculateAll()" />
                </div>
            </div>

            <div class="grid-dual">
                <div class="card">
                    <h2>If you sleep now:</h2>
                    <div id="ifSleepNow" class="results-list"></div>
                </div>
                <div class="card">
                    <h2>To wake up at:</h2>
                    <div id="ifWakeThen" class="results-list"></div>
                </div>
            </div>

            <div style="margin-top: 25px; text-align: center">
                <button class="btn-secondary" onclick="resetToNow()">
                    Current Time
                </button>
            </div>
        </div>

        <script>
            const timeInput = document.getElementById("baseTime");
            const sleepList = document.getElementById("ifSleepNow");
            const wakeList = document.getElementById("ifWakeThen");

            window.onload = resetToNow;

            function resetToNow() {
                const now = new Date();
                timeInput.value =
                    now.getHours().toString().padStart(2, "0") +
                    ":" +
                    now.getMinutes().toString().padStart(2, "0");
                calculateAll();
            }

            function formatTime(date) {
                return date.toLocaleTimeString([], {
                    hour: "2-digit",
                    minute: "2-digit",
                    hour12: false,
                });
            }

            function calculateAll() {
                const val = timeInput.value;
                if (!val) return;

                const [hrs, mins] = val.split(":");
                const baseDate = new Date();
                baseDate.setHours(parseInt(hrs), parseInt(mins), 0);

                const buffer = 15;
                const cycles = [6, 5, 4];

                let sleepHtml = "";
                cycles.forEach((c) => {
                    const d = new Date(
                        baseDate.getTime() + c * 90 * 60000 + buffer * 60000,
                    );
                    sleepHtml += `
                        <div class="time-slot ${c >= 5 ? "best" : ""}">
                            <span class="time-val">${formatTime(d)}</span>
                            <div class="time-meta">
                                <div>${c} Cycles</div>
                                <div>${(c * 1.5).toFixed(1)}h</div>
                            </div>
                        </div>`;
                });
                sleepList.innerHTML = sleepHtml;

                let wakeHtml = "";
                cycles.forEach((c) => {
                    const d = new Date(
                        baseDate.getTime() - c * 90 * 60000 - buffer * 60000,
                    );
                    wakeHtml += `
                        <div class="time-slot ${c >= 5 ? "best" : ""}">
                            <span class="time-val">${formatTime(d)}</span>
                            <div class="time-meta">
                                <div>${c} Cycles</div>
                                <div>${(c * 1.5).toFixed(1)}h</div>
                            </div>
                        </div>`;
                });
                wakeList.innerHTML = wakeHtml;
            }
        </script>
    </body>
</html>
