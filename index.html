<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="theme-color" content="#050505" />
        <title>Webtools</title>
        <link rel="manifest" href="/manifest.json" />
        <link rel="stylesheet" href="index.css" />
        <link rel="icon" type="image/webp" href="/favicon.webp" />
    </head>
    <body>
        <h1>Webtools</h1>

        <section id="body">
            <web-tool
                link="/iconpress"
                title="Iconpress"
                desc="Simple icon generator"
            ></web-tool>
            <web-tool
                link="/svg-opt"
                title="SVG Optimizer"
                desc="Minify vector graphics"
            ></web-tool>
            <web-tool
                link="/base64"
                title="Base64 Encoder"
                desc="Encode and decode strings"
            ></web-tool>
            <web-tool
                link="/sleep-calculator"
                title="Sleep Calculator"
                desc="Calculate your wake and bed time"
            ></web-tool>
        </section>

        <script>
            class WebTool extends HTMLElement {
                connectedCallback() {
                    const link = this.getAttribute("link") || "#";
                    const title = this.getAttribute("title") || "Title";
                    const desc = this.getAttribute("desc") || "Description";
                    this.innerHTML = `
            <a href="${link}" class="web-tool-link">
                <div class="service">
                    <span class="title">${title}</span>
                    <span class="description">${desc}</span>
                </div>
            </a>
        `;
                }
            }

            if (!customElements.get("web-tool")) {
                customElements.define("web-tool", WebTool);
            }

            if ("serviceWorker" in navigator) {
                window.addEventListener("load", () => {
                    navigator.serviceWorker
                        .register("/sw.js", { scope: "/" })
                        .then((registration) => {
                            registration.onupdatefound = () => {
                                const installingWorker =
                                    registration.installing;
                                installingWorker.onstatechange = () => {
                                    if (
                                        installingWorker.state === "installed"
                                    ) {
                                        if (
                                            navigator.serviceWorker.controller
                                        ) {
                                            console.log(
                                                "New version available.",
                                            );
                                        } else {
                                            console.log(
                                                "Content is cached for offline use.",
                                            );
                                        }
                                    }
                                };
                            };
                        })
                        .catch((error) => {
                            console.error(
                                "Service Worker registration failed:",
                                error,
                            );
                        });
                });
            }
        </script>
    </body>
</html>
