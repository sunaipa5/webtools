<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/webp" href="/favicon.webp" />
        <title>Iconpress</title>
        <style>
            :root {
                --card-bg: #242424;
                --accent: #3584e4;
                --text: #ffffff;
                --border: #333333;
                --input-bg: #111111;
            }

            @supports (color: color-mix(in srgb, AccentColor, transparent)) {
                :root {
                    --accent: AccentColor;
                }
            }

            @media screen and (max-width: 0px) {
                :root {
                    --accent: var(--adwaita-blue);
                }
            }

            * {
                user-select: none;
                -webkit-user-drag: none;
                box-sizing: border-box;
            }

            body {
                font-family: "Segoe UI", Ubuntu, sans-serif;
                background-color: var(--bg-color);
                color: var(--text);
                margin: 0;
                height: 100vh;
                display: flex;
                overflow: hidden;
            }

            .app-container {
                display: grid;
                grid-template-columns: 1fr 340px;
                width: 100%;
                height: 100%;
            }

            .preview-box {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                background: #141414;
                position: relative;
            }

            canvas {
                background-image:
                    linear-gradient(45deg, #1d1d1d 25%, transparent 25%),
                    linear-gradient(-45deg, #1d1d1d 25%, transparent 25%),
                    linear-gradient(45deg, transparent 75%, #1d1d1d 75%),
                    linear-gradient(-45deg, transparent 75%, #1d1d1d 75%);
                background-size: 20px 20px;
                border-radius: 12px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
                max-width: 70%;
                max-height: 60%;
            }

            .controls {
                background: var(--card-bg);
                border-left: 1px solid var(--border);
                padding: 24px;
                display: flex;
                flex-direction: column;
                gap: 16px;
                overflow-y: auto;
            }

            .control-group {
                display: flex;
                flex-direction: column;
                gap: 6px;
            }

            .label-row {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            label {
                font-size: 0.65rem;
                font-weight: 800;
                color: #777;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            .num-input,
            .hex-input {
                background: var(--input-bg);
                border: 1px solid var(--border);
                color: var(--text);
                border-radius: 4px;
                padding: 4px 8px;
                font-family: monospace;
                font-size: 0.8rem;
                outline: none;
            }

            .num-input:focus,
            .hex-input:focus {
                border-color: var(--accent);
            }

            input[type="color"] {
                border: 1px solid var(--border);
                width: 100%;
                height: 32px;
                cursor: pointer;
                background: var(--input-bg);
                border-radius: 6px;
            }

            input[type="range"] {
                accent-color: var(--accent);
            }

            textarea {
                background: var(--input-bg);
                border: 1px solid var(--border);
                border-radius: 6px;
                color: var(--text);
                resize: none;
                padding: 8px;
                font-family: monospace;
                font-size: 10px;
                min-height: 60px;
                user-select: text;
                outline: none;
            }

            textarea:focus {
                border: 1px solid var(--accent);
            }

            .file-upload {
                background: #2d2d2d;
                padding: 25px;
                border-radius: 8px;
                text-align: center;
                border: 2px dashed #444;
                position: relative;
                cursor: pointer;
                transition: all 0.2s ease;
            }

            .file-upload.drag-over {
                background: rgba(53, 132, 228, 0.1);
                border-color: var(--accent);
                color: var(--accent);
                transform: scale(1.02);
            }

            .file-upload span {
                font-size: 0.8rem;
                pointer-events: none;
            }

            .btn-secondary {
                background: #2d2d2d;
                border: 1px solid #3d3d3d;
                color: #ccc;
                padding: 8px;
                border-radius: 6px;
                cursor: pointer;
                font-size: 0.75rem;
            }

            .btn-secondary:hover {
                background: #3d3d3d;
                border-color: var(--accent);
            }

            .custom-export {
                display: flex;
                gap: 5px;
                margin-top: 10px;
            }

            .custom-export input {
                flex: 1;
            }
        </style>
    </head>
    <body>
        <div class="app-container">
            <div class="preview-box">
                <canvas id="iconCanvas" width="1024" height="1024"></canvas>
                <div
                    style="
                        margin-top: 20px;
                        color: #444;
                        font-size: 10px;
                        font-weight: bold;
                        letter-spacing: 2px;
                    "
                >
                    ICONPRESS
                </div>
            </div>

            <div class="controls">
                <div class="control-group">
                    <div class="label-row">
                        <label>Background</label>
                        <input
                            type="text"
                            id="bgHex"
                            class="hex-input"
                            maxlength="7"
                        />
                    </div>
                    <input type="color" id="bgColor" />
                </div>

                <div class="control-group">
                    <div class="label-row">
                        <label>Icon Tint</label>
                        <input
                            type="text"
                            id="fgHex"
                            class="hex-input"
                            maxlength="7"
                        />
                    </div>
                    <input type="color" id="fgColor" />
                </div>

                <div class="control-group">
                    <div class="label-row">
                        <label>Rounding (%)</label>
                        <input
                            type="number"
                            id="roundingNum"
                            class="num-input"
                        />
                    </div>
                    <input type="range" id="rounding" min="0" max="50" />
                </div>

                <div class="control-group">
                    <div class="label-row">
                        <label>Icon Scale (%)</label>
                        <input
                            type="number"
                            id="symbolSizeNum"
                            class="num-input"
                        />
                    </div>
                    <input type="range" id="symbolSize" min="5" max="100" />
                </div>

                <div class="control-group">
                    <label>Input Image (SVG, PNG, JPG)</label>
                    <div class="file-upload" id="dropZone">
                        <span id="uploadText">Click or Drag & Drop</span>
                        <input
                            type="file"
                            id="imageInput"
                            accept=".svg,.png,.jpg,.jpeg"
                            style="
                                position: absolute;
                                opacity: 0;
                                inset: 0;
                                cursor: pointer;
                            "
                        />
                    </div>

                    <button
                        class="btn-secondary"
                        onclick="clearImage()"
                        style="
                            width: 100%;
                            margin-top: 5px;
                            color: #ff4444;
                            border-color: #ff444422;
                        "
                    >
                        Remove Image
                    </button>

                    <textarea
                        id="svgPaste"
                        placeholder="Or paste <svg> here..."
                    ></textarea>
                </div>

                <div class="control-group">
                    <label>Export Format</label>
                    <select
                        id="exportFormat"
                        class="num-input"
                        style="width: 100%; height: 32px"
                    >
                        <option value="image/png" selected>
                            PNG (Lossless)
                        </option>
                        <option value="image/jpeg">JPG (Smaller)</option>
                        <option value="image/webp">WebP (Modern)</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Quick Export</label>
                    <div
                        style="
                            display: grid;
                            grid-template-columns: repeat(3, 1fr);
                            gap: 5px;
                        "
                    >
                        <button
                            class="btn-secondary"
                            onclick="downloadIcon(64)"
                        >
                            64px
                        </button>
                        <button
                            class="btn-secondary"
                            onclick="downloadIcon(128)"
                        >
                            128px
                        </button>
                        <button
                            class="btn-secondary"
                            onclick="downloadIcon(256)"
                        >
                            256px
                        </button>
                        <button
                            class="btn-secondary"
                            onclick="downloadIcon(512)"
                        >
                            512px
                        </button>
                        <button
                            class="btn-secondary"
                            onclick="exportAndroid()"
                            style="color: #a4c639"
                        >
                            Android ZIP
                        </button>
                        <button
                            class="btn-secondary"
                            onclick="exportIOS()"
                            style="color: #a40900"
                        >
                            iOS ZIP
                        </button>
                    </div>
                </div>

                <div class="control-group">
                    <label>Custom Export (Max 4096px)</label>
                    <div class="custom-export">
                        <input
                            type="number"
                            id="customPx"
                            class="num-input"
                            placeholder="Size"
                            min="1"
                            max="4096"
                            value="1024"
                        />
                        <button
                            class="btn-secondary"
                            onclick="
                                downloadIcon(
                                    document.getElementById('customPx').value,
                                )
                            "
                            style="
                                border-color: var(--accent);
                                color: white;
                                background: var(--accent);
                            "
                        >
                            Export
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <script src="./jszip.min.js"></script>
        <script>
            const canvas = document.getElementById("iconCanvas");
            const ctx = canvas.getContext("2d");
            let loadedImg = null;
            let isSVG = false;
            const dropZone = document.getElementById("dropZone");
            const uploadText = document.getElementById("uploadText");

            const el = {
                bgColor: document.getElementById("bgColor"),
                bgHex: document.getElementById("bgHex"),
                fgColor: document.getElementById("fgColor"),
                fgHex: document.getElementById("fgHex"),
                rounding: document.getElementById("rounding"),
                roundingNum: document.getElementById("roundingNum"),
                symbolSize: document.getElementById("symbolSize"),
                symbolSizeNum: document.getElementById("symbolSizeNum"),
                imageInput: document.getElementById("imageInput"),
                svgPaste: document.getElementById("svgPaste"),
            };

            const init = () => {
                const getActualHex = (colorStr) => {
                    if (colorStr.startsWith("#")) return colorStr;

                    const temp = document.createElement("div");
                    temp.style.color = colorStr;
                    temp.style.display = "none";
                    document.body.appendChild(temp);

                    const rgb = getComputedStyle(temp).color;
                    document.body.removeChild(temp);

                    const match = rgb.match(/\d+/g);
                    if (!match) return "#3584e4";

                    return (
                        "#" +
                        match
                            .slice(0, 3)
                            .map((x) => {
                                const hex = parseInt(x).toString(16);
                                return hex.length === 1 ? "0" + hex : hex;
                            })
                            .join("")
                    );
                };

                const rawAccent = getComputedStyle(document.documentElement)
                    .getPropertyValue("--accent")
                    .trim();
                const systemHex = getActualHex(rawAccent);

                const settings = JSON.parse(
                    localStorage.getItem("iconpress-cfg"),
                ) || {
                    bg: systemHex,
                    fg: "#ffffff",
                    round: 24,
                    size: 60,
                };

                el.bgColor.value = el.bgHex.value = settings.bg;
                el.fgColor.value = el.fgHex.value = settings.fg;
                el.rounding.value = el.roundingNum.value = settings.round;
                el.symbolSize.value = el.symbolSizeNum.value = settings.size;

                syncColors(el.bgColor, el.bgHex);
                syncColors(el.fgColor, el.fgHex);
                syncRanges(el.rounding, el.roundingNum);
                syncRanges(el.symbolSize, el.symbolSizeNum);
            };

            //------ DRAG & DROP ------
            dropZone.addEventListener("dragover", (e) => {
                e.preventDefault();
                dropZone.classList.add("drag-over");
                uploadText.innerText = "Drop it now!";
            });

            ["dragleave", "drop"].forEach((type) => {
                dropZone.addEventListener(type, () => {
                    dropZone.classList.remove("drag-over");
                });
            });

            dropZone.addEventListener("drop", (e) => {
                e.preventDefault();
                const file = e.dataTransfer.files[0];
                if (file) {
                    el.imageInput.files = e.dataTransfer.files;
                    el.imageInput.dispatchEvent(new Event("change"));
                }
            });

            el.imageInput.addEventListener("change", (e) => {
                const file = e.target.files[0];
                if (file) {
                    el.svgPaste.value = "";

                    uploadText.innerText = "File: " + file.name;

                    isSVG = file.type === "image/svg+xml";
                    const reader = new FileReader();
                    reader.onload = (ev) => loadImageFromSrc(ev.target.result);
                    reader.readAsDataURL(file);
                } else {
                    uploadText.innerText = "Click or Drag & Drop";
                }
            });

            const syncColors = (picker, hex) => {
                picker.addEventListener("input", () => {
                    hex.value = picker.value;
                    draw();
                });
                hex.addEventListener("input", () => {
                    if (/^#[0-9A-F]{6}$/i.test(hex.value)) {
                        picker.value = hex.value;
                        draw();
                    }
                });
            };

            const syncRanges = (slider, num) => {
                slider.addEventListener("input", () => {
                    num.value = slider.value;
                    draw();
                });
                num.addEventListener("input", () => {
                    slider.value = num.value;
                    draw();
                });
            };

            function loadImageFromSrc(src) {
                const img = new Image();
                img.onload = () => {
                    loadedImg = img;
                    draw();
                };
                img.src = src;
            }

            function shadeColor(color, percent) {
                let R = parseInt(color.substring(1, 3), 16),
                    G = parseInt(color.substring(3, 5), 16),
                    B = parseInt(color.substring(5, 7), 16);
                R = Math.min(255, parseInt((R * (100 + percent)) / 100));
                G = Math.min(255, parseInt((G * (100 + percent)) / 100));
                B = Math.min(255, parseInt((B * (100 + percent)) / 100));
                return (
                    "#" +
                    ((1 << 24) + (R << 16) + (G << 8) + B).toString(16).slice(1)
                );
            }

            function clearImage() {
                loadedImg = null;
                isSVG = false;
                el.imageInput.value = "";
                el.svgPaste.value = "";
                uploadText.innerText = "Click or Drag & Drop";
                draw();
            }

            el.imageInput.addEventListener("change", (e) => {
                const file = e.target.files[0];
                if (file) {
                    el.svgPaste.value = "";
                    isSVG = file.type === "image/svg+xml";
                    const reader = new FileReader();
                    reader.onload = (ev) => loadImageFromSrc(ev.target.result);
                    reader.readAsDataURL(file);
                    uploadText.innerText = "File: " + file.name;
                }
            });

            el.svgPaste.addEventListener("input", (e) => {
                const code = e.target.value.trim();
                if (code.includes("<svg")) {
                    el.imageInput.value = "";
                    uploadText.innerText = "Click or Drag & Drop";

                    isSVG = true;
                    const blob = new Blob([code], {
                        type: "image/svg+xml;charset=utf-8",
                    });
                    loadImageFromSrc(URL.createObjectURL(blob));
                } else if (code === "") {
                    clearImage();
                }
            });

            function draw(
                targetCtx = ctx,
                targetSize = 1024,
                isExport = false,
            ) {
                const bgCol = el.bgColor.value;
                const fgCol = el.fgColor.value;
                const roundPct = el.rounding.value;
                const symPct = el.symbolSize.value;

                targetCtx.clearRect(0, 0, targetSize, targetSize);

                const margin = isExport ? 0 : targetSize * 0.08;
                const drawSize = targetSize - margin * 2;
                const radius = (drawSize * roundPct) / 100;

                if (!isExport) {
                    targetCtx.shadowColor = "rgba(0,0,0,0.5)";
                    targetCtx.shadowBlur = targetSize * 0.04;
                    targetCtx.shadowOffsetY = targetSize * 0.02;
                }

                const grad = targetCtx.createLinearGradient(
                    0,
                    margin,
                    0,
                    margin + drawSize,
                );
                grad.addColorStop(0, bgCol);
                grad.addColorStop(1, shadeColor(bgCol, -15));
                targetCtx.fillStyle = grad;

                targetCtx.beginPath();
                targetCtx.roundRect(margin, margin, drawSize, drawSize, radius);
                targetCtx.fill();

                targetCtx.shadowColor = "transparent";
                targetCtx.shadowBlur = 0;

                targetCtx.save();
                targetCtx.clip();

                if (loadedImg) {
                    const sSize = drawSize * (symPct / 100);
                    const offset = (targetSize - sSize) / 2;

                    if (isSVG) {
                        const offscreen = document.createElement("canvas");
                        offscreen.width = targetSize;
                        offscreen.height = targetSize;
                        const oCtx = offscreen.getContext("2d");

                        oCtx.drawImage(loadedImg, offset, offset, sSize, sSize);
                        oCtx.globalCompositeOperation = "source-in";
                        oCtx.fillStyle = fgCol;
                        oCtx.fillRect(0, 0, targetSize, targetSize);

                        targetCtx.drawImage(offscreen, 0, 0);
                    } else {
                        targetCtx.drawImage(
                            loadedImg,
                            offset,
                            offset,
                            sSize,
                            sSize,
                        );
                    }
                }

                targetCtx.restore();
            }

            async function getResizedBlob(size) {
                const c = document.createElement("canvas");
                c.width = size;
                c.height = size;
                draw(c.getContext("2d"), size, true);
                return new Promise((r) => c.toBlob(r, "image/png"));
            }

            function downloadIcon(size) {
                size = Math.min(Math.max(size, 1), 4096);

                const formatSelect = document.getElementById("exportFormat");
                const mimeType = formatSelect.value;

                const extension = mimeType === "image/webp" ? "webp" : "png";

                const tempCanvas = document.createElement("canvas");
                tempCanvas.width = size;
                tempCanvas.height = size;
                const tempCtx = tempCanvas.getContext("2d");

                draw(tempCtx, size, true);

                const link = document.createElement("a");

                link.download = `icon_${size}x${size}.${extension}`;

                link.href = tempCanvas.toDataURL(mimeType, 0.9);

                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }

            async function exportAndroid() {
                const zip = new JSZip();
                const res = {
                    mdpi: 48,
                    hdpi: 72,
                    xhdpi: 96,
                    xxhdpi: 144,
                    xxxhdpi: 192,
                };
                for (let label in res) {
                    const blob = await getResizedBlob(res[label]);
                    zip.file(`mipmap-${label}/ic_launcher.png`, blob);
                }
                const content = await zip.generateAsync({ type: "blob" });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(content);
                link.download = "android_icons.zip";
                link.click();
            }

            async function exportIOS() {
                const zip = new JSZip();
                const res = {
                    "Icon-40": 40,
                    "Icon-60": 60,
                    "Icon-58": 58,
                    "Icon-87": 87,
                    "Icon-80": 80,
                    "Icon-120": 120,
                    "Icon-180": 180,
                    "Icon-1024": 1024,
                };
                for (let name in res) {
                    const blob = await getResizedBlob(res[name]);
                    zip.file(`${name}.png`, blob);
                }
                const content = await zip.generateAsync({ type: "blob" });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(content);
                link.download = "ios_icons.zip";
                link.click();
            }

            init();
            draw();
        </script>
    </body>
</html>
