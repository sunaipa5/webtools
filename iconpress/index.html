<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Adwaita Icon Forge</title>
        <style>
            :root {
                --bg-color: #1a1a1a;
                --card-bg: #242424;
                --accent: AccentColor;
                --text: #ffffff;
                --border: #333333;
                --input-bg: #111111;
            }

            /* Desktop App Feel: Prevent selection and scrolling */
            * {
                user-select: none;
                -webkit-user-drag: none;
                box-sizing: border-box;
            }

            body {
                font-family: "Segoe UI", Ubuntu, sans-serif;
                background-color: var(--bg-color);
                color: var(--text);
                margin: 0;
                height: 100vh;
                display: flex;
                overflow: hidden; /* No scroll for desktop app feel */
            }

            .app-container {
                display: grid;
                grid-template-columns: 1fr 340px; /* Sidebar layout */
                width: 100%;
                height: 100%;
            }

            /* Left side: Canvas preview */
            .preview-box {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                background: #141414;
                position: relative;
            }

            canvas {
                background-image:
                    linear-gradient(45deg, #1d1d1d 25%, transparent 25%),
                    linear-gradient(-45deg, #1d1d1d 25%, transparent 25%),
                    linear-gradient(45deg, transparent 75%, #1d1d1d 75%),
                    linear-gradient(-45deg, transparent 75%, #1d1d1d 75%);
                background-size: 20px 20px;
                border-radius: 12px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
                max-width: 90%;
                max-height: 80%;
                object-fit: contain;
            }

            /* Right side: Sidebar controls */
            .controls {
                background: var(--card-bg);
                border-left: 1px solid var(--border);
                padding: 24px;
                display: flex;
                flex-direction: column;
                gap: 16px;
                overflow-y: auto; /* Scroll only settings if needed */
            }

            .control-group {
                display: flex;
                flex-direction: column;
                gap: 6px;
            }

            .label-row {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            label {
                font-size: 0.65rem;
                font-weight: 800;
                color: #777;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            .num-input,
            .hex-input {
                background: var(--input-bg);
                border: 1px solid var(--accent);
                color: var(--text);
                border-radius: 4px;
                padding: 2px 6px;
                font-family: monospace;
                font-size: 0.8rem;
                outline: none;
            }

            input[type="color"] {
                border: 1px solid var(--border);
                width: 100%;
                height: 32px;
                cursor: pointer;
                background: var(--input-bg);
                border-radius: 6px;
                outline: none;
            }

            input[type="range"] {
                accent-color: var(--accent);
                cursor: pointer;
            }

            textarea {
                background: var(--input-bg);
                border: 1px solid var(--border);
                border-radius: 6px;
                color: var(--text);
                resize: none;
                padding: 8px;
                font-family: monospace;
                font-size: 10px;
                min-height: 60px;
                outline: none;
                user-select: text; /* Allow paste */
            }

            .file-upload {
                background: #2d2d2d;
                padding: 10px;
                border-radius: 6px;
                text-align: center;
                border: 1px dashed #444;
                cursor: pointer;
                font-size: 0.8rem;
            }

            .btn-primary {
                background-color: var(--accent);
                color: white;
                border: none;
                padding: 12px;
                border-radius: 8px;
                font-weight: bold;
                cursor: pointer;
                margin-top: auto; /* Push to bottom */
            }

            .btn-secondary {
                background: #2d2d2d;
                border: 1px solid #3d3d3d;
                color: #ccc;
                padding: 8px;
                border-radius: 8px;
                cursor: pointer;
                font-size: 0.8rem;
            }
        </style>
    </head>
    <body>
        <div class="app-container">
            <div class="preview-box">
                <canvas id="iconCanvas" width="512" height="512"></canvas>
                <div
                    style="
                        margin-top: 20px;
                        color: #444;
                        font-size: 10px;
                        font-weight: bold;
                        letter-spacing: 2px;
                    "
                >
                    Icon Press
                </div>
            </div>

            <div class="controls">
                <div class="control-group">
                    <div class="label-row">
                        <label>Background</label>
                        <input
                            type="text"
                            id="bgHex"
                            class="hex-input"
                            maxlength="7"
                        />
                    </div>
                    <input type="color" id="bgColor" />
                </div>

                <div class="control-group">
                    <div class="label-row">
                        <label>Icon Color</label>
                        <input
                            type="text"
                            id="fgHex"
                            class="hex-input"
                            maxlength="7"
                        />
                    </div>
                    <input type="color" id="fgColor" />
                </div>

                <div class="control-group">
                    <div class="label-row">
                        <label>Rounding (%)</label>
                        <input
                            type="number"
                            id="roundingNum"
                            class="num-input"
                        />
                    </div>
                    <input type="range" id="rounding" min="0" max="50" />
                </div>

                <div class="control-group">
                    <div class="label-row">
                        <label>Icon Scale (%)</label>
                        <input
                            type="number"
                            id="symbolSizeNum"
                            class="num-input"
                        />
                    </div>
                    <input type="range" id="symbolSize" min="10" max="90" />
                </div>

                <div class="control-group">
                    <label>SVG Entry</label>
                    <div class="file-upload">
                        <span>Pick File</span>
                        <input
                            type="file"
                            id="svgInput"
                            accept=".svg"
                            style="
                                position: absolute;
                                opacity: 0;
                                width: 100%;
                                left: 0;
                                cursor: pointer;
                            "
                        />
                    </div>
                    <textarea
                        id="svgPaste"
                        placeholder="Paste <svg>..."
                    ></textarea>
                </div>
                <div class="label-row">
                    <label>Export</label>
                </div>
                <div
                    style="
                        display: grid;
                        grid-template-columns: 1fr 1fr;
                        gap: 8px;
                    "
                >
                    <button class="btn-secondary" onclick="downloadIcon(64)">
                        64px
                    </button>
                    <button class="btn-secondary" onclick="downloadIcon(128)">
                        128px
                    </button>
                    <button class="btn-secondary" onclick="downloadIcon(256)">
                        256px
                    </button>
                    <button class="btn-secondary" onclick="downloadIcon(512)">
                        512px
                    </button>
                    <button class="btn-secondary" onclick="downloadIcon(1024)">
                        1024px
                    </button>
                </div>
                <div
                    style="
                        display: grid;
                        grid-template-columns: 1fr 1fr;
                        gap: 8px;
                        margin-top: 10px;
                    "
                >
                    <button
                        class="btn-secondary"
                        onclick="exportAndroid()"
                        style="border-color: #a4c639; color: #a4c639"
                    >
                        Android ZIP
                    </button>
                    <button
                        class="btn-secondary"
                        onclick="exportIOS()"
                        style="border-color: #ff3b30; color: #ff3b30"
                    >
                        iOS ZIP
                    </button>
                </div>
            </div>
        </div>
        <script src="./jszip.min.js"></script>
        <script>
            const canvas = document.getElementById("iconCanvas");
            const ctx = canvas.getContext("2d");
            let loadedSvg = null;

            const el = {
                bgColor: document.getElementById("bgColor"),
                bgHex: document.getElementById("bgHex"),
                fgColor: document.getElementById("fgColor"),
                fgHex: document.getElementById("fgHex"),
                rounding: document.getElementById("rounding"),
                roundingNum: document.getElementById("roundingNum"),
                symbolSize: document.getElementById("symbolSize"),
                symbolSizeNum: document.getElementById("symbolSizeNum"),
                svgInput: document.getElementById("svgInput"),
                svgPaste: document.getElementById("svgPaste"),
            };

            // Initialize Defaults / Load LocalStorage
            const settings = JSON.parse(
                localStorage.getItem("adwaita-forge-cfg"),
            ) || {
                bg: "#3584e4",
                fg: "#ffffff",
                round: 24,
                size: 55,
            };

            const init = () => {
                el.bgColor.value = el.bgHex.value = settings.bg;
                el.fgColor.value = el.fgHex.value = settings.fg;
                el.rounding.value = el.roundingNum.value = settings.round;
                el.symbolSize.value = el.symbolSizeNum.value = settings.size;
            };

            // Sync Helper
            const syncColors = (picker, hex) => {
                picker.addEventListener("input", () => {
                    hex.value = picker.value;
                    update();
                });
                hex.addEventListener("input", () => {
                    if (/^#[0-9A-F]{6}$/i.test(hex.value)) {
                        picker.value = hex.value;
                        update();
                    }
                });
            };

            const syncRanges = (slider, num) => {
                slider.addEventListener("input", () => {
                    num.value = slider.value;
                    update();
                });
                num.addEventListener("input", () => {
                    slider.value = num.value;
                    update();
                });
            };

            syncColors(el.bgColor, el.bgHex);
            syncColors(el.fgColor, el.fgHex);
            syncRanges(el.rounding, el.roundingNum);
            syncRanges(el.symbolSize, el.symbolSizeNum);

            // Load Logic
            el.svgInput.addEventListener("change", (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => loadSvgFromSrc(ev.target.result);
                    reader.readAsDataURL(file);
                }
            });

            el.svgPaste.addEventListener("input", (e) => {
                const code = e.target.value.trim();
                if (code.includes("<svg")) {
                    const blob = new Blob([code], {
                        type: "image/svg+xml;charset=utf-8",
                    });
                    loadSvgFromSrc(URL.createObjectURL(blob));
                }
            });

            function loadSvgFromSrc(src) {
                const img = new Image();
                img.onload = () => {
                    loadedSvg = img;
                    draw();
                };
                img.src = src;
            }

            function update() {
                localStorage.setItem(
                    "adwaita-forge-cfg",
                    JSON.stringify({
                        bg: el.bgColor.value,
                        fg: el.fgColor.value,
                        round: el.rounding.value,
                        size: el.symbolSize.value,
                    }),
                );
                draw();
            }

            function draw() {
                const size = canvas.width;
                const bgCol = el.bgColor.value;
                const fgCol = el.fgColor.value;
                const roundPct = el.rounding.value;
                const symPct = el.symbolSize.value;

                ctx.clearRect(0, 0, size, size);
                ctx.shadowColor = "rgba(0,0,0,0.5)";
                ctx.shadowBlur = 35;
                ctx.shadowOffsetY = 15;

                const gradient = ctx.createLinearGradient(0, 0, 0, size);
                gradient.addColorStop(0, bgCol);
                gradient.addColorStop(1, shadeColor(bgCol, -18));

                ctx.fillStyle = gradient;
                const margin = 40;
                const drawSize = size - margin * 2;
                const radius = (drawSize * roundPct) / 100;

                ctx.beginPath();
                ctx.roundRect(margin, margin, drawSize, drawSize, radius);
                ctx.fill();

                ctx.shadowColor = "transparent";
                ctx.shadowBlur = 0;

                if (loadedSvg) {
                    const sSize = drawSize * (symPct / 100);
                    const offset = (size - sSize) / 2;

                    // Smart Tinting: Render icon with chosen color
                    const offscreen = document.createElement("canvas");
                    offscreen.width = size;
                    offscreen.height = size;
                    const oCtx = offscreen.getContext("2d");

                    oCtx.drawImage(loadedSvg, offset, offset, sSize, sSize);
                    oCtx.globalCompositeOperation = "source-in";
                    oCtx.fillStyle = fgCol;
                    oCtx.fillRect(0, 0, size, size);

                    ctx.drawImage(offscreen, 0, 0);
                }
            }

            function shadeColor(color, percent) {
                let R = parseInt(color.substring(1, 3), 16);
                let G = parseInt(color.substring(3, 5), 16);
                let B = parseInt(color.substring(5, 7), 16);
                R = parseInt((R * (100 + percent)) / 100);
                G = parseInt((G * (100 + percent)) / 100);
                B = parseInt((B * (100 + percent)) / 100);
                return (
                    "#" +
                    ((1 << 24) + (R << 16) + (G << 8) + B).toString(16).slice(1)
                );
            }

            function downloadIcon(exportSize) {
                const tempCanvas = document.createElement("canvas");
                tempCanvas.width = exportSize;
                tempCanvas.height = exportSize;
                const tempCtx = tempCanvas.getContext("2d");
                tempCtx.drawImage(canvas, 0, 0, exportSize, exportSize);
                const link = document.createElement("a");
                link.download = `icon_${exportSize}.png`;
                link.href = tempCanvas.toDataURL("image/png");
                link.click();
            }

            async function getResizedBlob(size) {
                const canvas = document.getElementById("iconCanvas");
                return new Promise((resolve) => {
                    const tempCanvas = document.createElement("canvas");
                    tempCanvas.width = size;
                    tempCanvas.height = size;
                    const tempCtx = tempCanvas.getContext("2d");
                    tempCtx.drawImage(canvas, 0, 0, size, size);
                    tempCanvas.toBlob((blob) => resolve(blob), "image/png");
                });
            }

            // Android Export
            async function exportAndroid() {
                const zip = new JSZip();
                const res = {
                    "mipmap-mdpi": 48,
                    "mipmap-hdpi": 72,
                    "mipmap-xhdpi": 96,
                    "mipmap-xxhdpi": 144,
                    "mipmap-xxxhdpi": 192,
                    "playstore-icon": 512,
                };

                for (let path in res) {
                    const blob = await getResizedBlob(res[path]);
                    zip.file(`${path}/ic_launcher.png`, blob);
                }

                const content = await zip.generateAsync({ type: "blob" });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(content);
                link.download = "android_icons.zip";
                link.click();
            }

            // iOS Export
            async function exportIOS() {
                const zip = new JSZip();
                const res = {
                    "Icon-40": 40,
                    "Icon-60": 60,
                    "Icon-58": 58,
                    "Icon-87": 87,
                    "Icon-80": 80,
                    "Icon-120": 120,
                    "Icon-180": 180,
                    "Icon-1024": 1024,
                };

                for (let name in res) {
                    const blob = await getResizedBlob(res[name]);
                    zip.file(`${name}.png`, blob);
                }

                const content = await zip.generateAsync({ type: "blob" });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(content);
                link.download = "ios_icons.zip";
                link.click();
            }

            init();
            draw();
        </script>
    </body>
</html>
